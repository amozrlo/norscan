name: Build Android APK

# Builds an installable debug APK in the cloud — no Android Studio needed.
# Push to GitHub, open the Actions tab, run this workflow, then download the APK
# from the run's "Artifacts" section.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Vendor libraries + Tesseract data (offline assets)
        run: npm run bundle

      - name: Add Android platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Add camera permission to Android manifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.CAMERA" "$M" || sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <application#' "$M"
          echo "----- AndroidManifest.xml -----"; cat "$M"

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NorScan-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
